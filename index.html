<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Global AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0f172a;color:white;}
.container{padding:40px;}
.topbar{display:flex;justify-content:space-between;margin-bottom:30px;}
button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
.lang{background:#1e293b;color:white;}
.ai-box{
background:#111827;
padding:25px;
border-radius:15px;
margin-top:20px;
}
input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}
.response{
margin-top:15px;
background:#1e293b;
padding:15px;
border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="topbar">
<h2 id="title">Nexora AI Business Assistant</h2>
<div>
<button class="lang" onclick="setLang('es')">ES</button>
<button class="lang" onclick="setLang('en')">EN</button>
</div>
</div>

<div class="ai-box">
<h3 id="aiTitle">Asistente Inteligente</h3>
<p id="aiDesc">Escribí una pregunta sobre tu negocio:</p>
<input type="text" id="question" placeholder="Ej: Cómo aumentar ingresos?">
<button onclick="runAI()">Consultar</button>

<div class="response" id="responseBox" style="display:none;"></div>
</div>

</div>

<script>

let lang="es";

function setLang(l){
lang=l;
if(l==="en"){
document.getElementById("title").innerText="Nexora AI Business Assistant";
document.getElementById("aiTitle").innerText="Intelligent Business Assistant";
document.getElementById("aiDesc").innerText="Ask a question about your business:";
document.getElementById("question").placeholder="Ex: How to increase revenue?";
}else{
document.getElementById("title").innerText="Nexora AI Business Assistant";
document.getElementById("aiTitle").innerText="Asistente Inteligente";
document.getElementById("aiDesc").innerText="Escribí una pregunta sobre tu negocio:";
document.getElementById("question").placeholder="Ej: Cómo aumentar ingresos?";
}
}

function runAI(){
let q=document.getElementById("question").value.toLowerCase();
let response="";

if(lang==="es"){
if(q.includes("ingreso")){
response="📈 Recomendación: aumentá precios estratégicamente, ofrecé paquetes premium y mejorá retención de clientes.";
}
else if(q.includes("cliente")){
response="👥 Sugerencia: implementá seguimiento post-servicio y programa de fidelización.";
}
else{
response="💡 Consejo estratégico: optimizá procesos internos y analizá métricas mensuales para crecer.";
}
}
else{
if(q.includes("revenue")){
response="📈 Recommendation: adjust pricing strategically and introduce premium packages.";
}
else if(q.includes("client")){
response="👥 Suggestion: implement post-service follow-up and loyalty programs.";
}
else{
response="💡 Strategic advice: optimize internal processes and analyze monthly metrics.";
}
}

document.getElementById("responseBox").style.display="block";
document.getElementById("responseBox").innerText=response;
}

</script>

</body>
</html>
